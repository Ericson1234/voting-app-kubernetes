apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
  labels:
    app: app:votacion
spec:
  replicas: 1
  selector:
    matchLabels:
      name: vote
      app: app-votacion
  template:
    metadata:
      name: vote
      labels:
        name: vote
        app: app:votacion
    spec:
      containers:
      - name: vote
        image: dockersamples/examplevotingapp_vote
        ports:
        - containerPort: 80
          name: vote
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"